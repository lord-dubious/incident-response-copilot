<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Incident Response Copilot</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f172a'/%3E%3Cpath d='M32 10 54 50H10z' fill='%23f97316'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="shell">
    <aside>
      <p>Incident workspace</p>
      <h1>Response Copilot</h1>
      <button id="reset">Reset demo</button>
      <div class="triage-panel">
        <span class="eyebrow">Local triage</span>
        <h2>Create incident</h2>
        <textarea id="triage-json" aria-label="Incident triage JSON"></textarea>
        <button id="triage" class="secondary">Triage alert</button>
        <small id="triage-status">Edit the sample alert, then generate a reviewable incident.</small>
      </div>
      <div id="incidents"></div>
    </aside>
    <section>
      <div class="hero">
        <h2 id="hero">Loading incidents...</h2>
        <div id="risk"></div>
      </div>
      <div id="metrics" class="metrics"></div>
      <div class="grid">
        <div>
          <h3>Evidence</h3>
          <div id="evidence"></div>
        </div>
        <div>
          <h3>Tasks and playbook</h3>
          <div id="tasks"></div>
        </div>
      </div>
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
